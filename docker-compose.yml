services:
  app:
    build:
      context: .
      target: dev
    command: sh -c "npx prisma generate && npx prisma db push && npm run seed && npm run dev:docker"
    env_file:
      - .env.docker
    ports:
      - "3000:3000"
    environment:
      NEXTAUTH_URL: http://localhost:3000
      WATCHPACK_POLLING: "true"
    volumes:
      - .:/app
      - app_node_modules:/app/node_modules
      - app_next:/app/.next
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    env_file:
      - .env.docker
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
  app_node_modules:
  app_next:
